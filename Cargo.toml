[package]
name = "findag-core"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.38", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
blake3 = "1.5"
libp2p = { version = "0.53", features = ["tcp-tokio", "dns-tokio", "noise", "yamux", "gossipsub"] }
ed25519-dalek = "2.1"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
base58 = "0.2"
regex = "1.10"
