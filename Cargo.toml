[package]
name = "findag-core"
version = "0.1.0"
edition = "2021"

[dependencies]
libp2p = { version = "0.53", features = ["tokio", "tcp", "dns", "noise", "yamux", "kad", "mdns", "gossipsub"] }
libp2p-swarm-derive = "0.35.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
ed25519-dalek = "1.0"
ring = "0.17"
warp = "0.3"
sled = "0.34"
chrono = "0.4"
uuid = { version = "1.0", features = ["v4"] }
env_logger = "0.11"
log = "0.4"
futures = "0.3"
async-trait = "0.1"
thiserror = "1.0"
rand = "0.8"
sha2 = "0.10"
regex = "1.10"
clap = { version = "4", features = ["derive"] }
ripemd = "0.1.3"
base58 = "0.2.0"
hex = "0.4"
